<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="styles/styles.css">
        <title>TODO List</title>
    </head>

    <body>
        <div id="content">
            <div id="main-window">
                <div class="main-window-title"><h1>TODO List</h1></div>
                <div class="main-window-nav">
                    <div><button>Home</button></div>
                    <div><button>Projects</button></div>
                    <div><button>Add</button></div>
                </div>
                <div class="main-window-display">
                </div>
            </div>
        </div>

        <div class="add-window">
            <div class="add-window-nav">
                <div>Create TODO</div>
                <div>Create Project</div>
            </div>

            <div class="add-window-todo-ui">
                <form>
                    <div><input type="text" name="todo-name" placeholder="Todo Title" required /></div>
                    <div><input type="text" name="todo-description" placeholder="Todo Description" required /></div>
                    <div><input type="date" name="todo-due-date" placeholder="Todo Due Date" required /></div>
                    <div>
                        <label for="todo-priorty">Priorty</label>
                        <select name="todo-priorty" id="todo-priorty">
                            <option value="Low">Low</option>
                            <option value="Medium">Medium</option>
                            <option value="High">High</option>
                        </select>
                    </div>
                </form>
            </div>
            <div class="add-window-project-ui">Project Items</div>
        </div>

        <script src="main.js"></script>
    </body>
</html>
