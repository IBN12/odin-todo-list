<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="styles/styles.css">
        <title>TODO List</title>
    </head>

    <body>
        <div id="content">
            <div id="main-window">
                <div class="main-window-title"><h1>TODO List</h1></div>
                <div class="main-window-nav">
                    <div><button>Home</button></div>
                    <div><button>Projects</button></div>
                    <div><button>Add</button></div>
                </div>
                <div class="main-window-display">
                </div>
            </div>
        </div>

        <div class="add-window">
            <div class="add-window-nav">
                <div><button>Create TODO</button></div>
                <div><button>Create Project</button></div>
            </div>

            <div class="add-window-todo-ui">
                <form class="add-window-todo-form">
                    <div><input type="text" id="todo-name" name="todo-name" placeholder="Todo Title" required /></div>
                    <div><input type="text" id="todo-description" name="todo-description" placeholder="Todo Description" required /></div>
                    <div><input type="date" id="todo-due-date" name="todo-due-date" placeholder="Todo Due Date" required /></div>
                    <div>
                        <label for="todo-priorty">Priorty</label>
                        <select name="todo-priorty" id="todo-priority">
                            <option value="Low">Low</option>
                            <option value="Medium">Medium</option>
                            <option value="High">High</option>
                        </select>
                    </div>
                    <div><button type="submit" id="todo-submit">Create TODO</button></div>
                </form>
            </div>

            <div class="add-window-project-ui">
                <form class="add-window-project-form">
                    <div>
                        <input type="text" id="project" name="project" placeholder="Project Name" required/>
                    </div>
                    <div>
                        <button type="submit" id="project-submit">Create Project</button>
                    </div>
                </form>
            </div>
        </div>

        <script src="main.js"></script>
    </body>
</html>
